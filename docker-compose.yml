# Self-hosted Telegram Bot API server.
# Raises the bot upload limit from 50 MB (cloud) to 2 GB.
#
# Reads TELEGRAM_API_ID and TELEGRAM_API_HASH from the .env file in this
# directory. Get them from https://my.telegram.org -> "API development tools".
#
#   docker compose up -d        # start the server
#   docker compose logs -f      # watch logs
#   docker compose down         # stop it

name: yovids

services:
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      # Max upload size in bytes (2000 MB). The server caps at 2 GB.
      TELEGRAM_MAX_WEBHOOK_CONNECTIONS: "100"
      # Log warnings/errors (incl. why an upload relay to Telegram is dropped).
      TELEGRAM_VERBOSITY: "2"
    ports:
      - "8081:8081"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api

volumes:
  telegram-bot-api-data:
